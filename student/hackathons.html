</head>

<body>
 <script>

const user =
localStorage.getItem("loggedInUser");

if(!user){

    window.location.href =
    "../auth/index.html";

}

</script>
<div class="sidebar">

    <div class="logo">
        PLACEMENTOR
    </div>

    <nav>

        <a href="dashboard.html">Dashboard</a>

        <a href="../resume/index.html">
            Resume Analyzer
        </a>

        <a href="jobs.html">
            Jobs
        </a>

        <a href="internships.html">
            Internships
        </a>

        <a href="events.html">

        </a>

        <a class="active" href="hackathons.html">
            Hackathons
        </a>

        <a href="profile.html">

        </a>

              <a href="saved.html">
    Saved
</a>

<a href="recommendations.html">
    Recommendations
</a>

<a href="#" onclick="logout()">
    Logout
</a>

    </nav>

</div>
<div class="overlay" id="overlay"></div>
<div class="main">
<div class="mobile-header">

    <button class="menu-btn" onclick="toggleSidebar()">
        ☰
    </button>

    <div class="mobile-logo">
        PLACEMENTOR
    </div>

</div>
    <div class="topbar">

        <h1>Hackathons & Competitions</h1>

        <input
        type="text"
        placeholder="Search hackathons..."
        class="search-box">

    </div>

    <div class="filters">

        <select>
            <option>Mode</option>
            <option>Online</option>
            <option>Offline</option>
        </select>

        <select>
            <option>Category</option>
            <option>AI/ML</option>
            <option>Web Development</option>
            <option>Cyber Security</option>
        </select>

        <select>
            <option>Prize Pool</option>
            <option>10K+</option>
            <option>50K+</option>
            <option>1L+</option>
        </select>

    </div>

    <div class="hackathon-grid" id="hackathonsContainer"></div>

</div>
<script src="../assets/js/hackathons.js"></script>

<script>
function toggleSidebar(){

    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("overlay");

    sidebar.classList.toggle("show");
    overlay.classList.toggle("show");

}
</script>

<script>

document.getElementById("overlay")
.addEventListener("click", function(){

    document.querySelector(".sidebar")
    .classList.remove("show");

    document.getElementById("overlay")
    .classList.remove("show");

});

</script>

<script>

document.querySelectorAll(".sidebar a")
.forEach(function(link){

    link.addEventListener("click", function(){

        document.querySelector(".sidebar")
        .classList.remove("show");

        document.getElementById("overlay")
        .classList.remove("show");

    });

});

</script>
<script>
function logout(){

    localStorage.removeItem("loggedInUser");

    window.location.href =
    "../auth/login.html";

}
</script>
</body>
</html>
